name: Deploy Documentation

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy docs from'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - 2.x
      version_alias:
        description: 'Version alias for docs (e.g., 3.x, 2.x)'
        required: true
        default: '3.x'
        type: choice
        options:
        - 3.x
        - 2.x
      set_latest:
        description: 'Set this version as latest?'
        required: true
        default: true
        type: boolean

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run:  uv sync --group docs --frozen
      - name: Configure Git for mike
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Deploy docs with mike
        run: |
          # Fetch gh-pages branch if it exists
          git fetch origin gh-pages:gh-pages || true

          # Deploy the version
          if [ "${{ github.event.inputs.set_latest }}" = "true" ]; then
            uv run mike deploy --push --update-aliases ${{ github.event.inputs.version_alias }} latest
            uv run mike set-default --push latest
          else
            uv run mike deploy --push ${{ github.event.inputs.version_alias }}
          fi
      - name: Publish site-root files (llms.txt, robots.txt, landing page)
        # mike serves every version under a subdirectory, so the generated
        # llms.txt/robots.txt live under /latest/ and are invisible at the site
        # root where crawlers and AI agents look. Mirror the curated root files
        # (and the generated llms-full.txt) into the gh-pages root after mike has
        # written the version. mike rewrites the root index.html as a bare
        # redirect on set-default, so this must run last to keep our richer one.
        if: hashFiles('site_root/**') != ''
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git worktree add ghpages gh-pages
          # Static root files (recursively, to include developers/index.html).
          cp -R site_root/. ghpages/
          rm -f ghpages/README.md
          if [ -f ghpages/latest/llms-full.txt ]; then
            cp ghpages/latest/llms-full.txt ghpages/llms-full.txt
          fi
          # Public OpenAPI document, served at the predictable /openapi.json.
          python scripts/build_public_openapi.py ghpages/openapi.json
          cd ghpages
          git add robots.txt llms.txt index.html llms-full.txt openapi.json developers
          if git diff --cached --quiet; then
            echo "Site-root files already up to date."
          else
            git commit -m "chore(docs): publish root llms.txt, robots.txt, openapi.json, developer portal"
            git push origin gh-pages
          fi
