name: Update Settings and create a PR
on:
  repository_dispatch:
    types: [update-sdk-settings]
  workflow_dispatch:

jobs:
  generate_settings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ vars.RAPIDATA_OPENAPI_GENERATOR_APP_ID }}
          private-key: ${{ secrets.RAPIDATA_OPENAPI_GENERATOR_PRIVATE_KEY }}
          owner: "RapidataAI"
          repositories: "rapids-frontend,rapidata-python-sdk"

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Fetch settings.json from frontend repo
        run: |
          curl -s -H "Authorization: token ${{ steps.generate-token.outputs.token }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/RapidataAI/rapids-frontend/contents/settings.json" \
            -o settings.json

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Generate settings
        run: uv run python scripts/generate_settings.py settings.json

      - name: Clean up settings.json
        run: rm settings.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: "settings-generation"
          title: 'Update SDK Settings'
          committer: Rudolf the Rabbit <login@rapidata.ai>
          author: Rudolf the Rabbit <login@rapidata.ai>
          delete-branch: true
          commit-message: 'chore: update SDK settings from frontend settings.json'
          token: ${{ steps.generate-token.outputs.token }}
          add-paths: |
            src/rapidata/rapidata_client/settings/
          reviewers: |
            kannwism
            LinoGiger
